<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Detection Interface</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Face API -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    
    <style>
        /* Ensure the canvas sits perfectly over the video */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans selection:bg-blue-500/30">

    <!-- Navigation / Header -->
    <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-20 shadow-sm">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600/20 p-2 rounded-lg text-blue-500">
                    <i data-lucide="scan-face"></i>
                </div>
                <h1 class="font-semibold text-xl tracking-tight">Find Expression</h1>
            </div>
            
            <!-- Status Badge -->
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-yellow-500/10 text-yellow-500 text-sm font-medium border border-yellow-500/20 transition-colors">
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin" id="status-icon"></i>
                <span id="status-text">Loading Models...</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-5xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col gap-6 items-center justify-center">
        
        <!-- App Container -->
        <div class="w-full bg-gray-900 rounded-2xl border border-gray-800 shadow-2xl overflow-hidden flex flex-col">
            
            <!-- Video/Canvas Area -->
            <div class="relative w-full aspect-video bg-black flex items-center justify-center overflow-hidden group">
                <!-- Placeholder when camera is off -->
                <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 z-0">
                    <i data-lucide="camera-off" class="w-16 h-16 mb-4 opacity-50"></i>
                    <p class="text-sm font-medium">Camera is turned off</p>
                </div>

                <!-- Video Element -->
                <video id="video" autoplay muted playsinline class="w-full h-full object-cover z-0 hidden"></video>
                
                <!-- The canvas will be injected here automatically by face-api or our script -->
            </div>

            <!-- Controls Area -->
            <div class="p-6 bg-gray-900 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="text-sm text-gray-400">
                    <p>Detects faces, expressions, and landmarks in real-time.</p>
                </div>
                
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <button id="toggle-camera-btn" disabled class="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-800 disabled:text-gray-500 disabled:cursor-not-allowed text-white px-6 py-2.5 rounded-xl font-medium transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                        <i data-lucide="video" class="w-4 h-4"></i>
                        <span>Start Camera</span>
                    </button>
                </div>
            </div>
        </div>

    </main>

    
</body>
</html>
